<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Penjernih Foto HD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bikin Foto Jadi HD ✨</h1>
        <p>Pilih foto buram kamu dan biarkan AI memperbaikinya!</p>
        
        <input type="file" id="imageInput" accept="image/*">
        <button id="upscaleBtn">Jernihkan Sekarang!</button>
        
        <p id="loadingText" style="display: none;">AI sedang bekerja, tunggu sebentar ya...</p>

        <div class="result-area">
            <h3>Hasil Foto:</h3>
            <img id="resultImage" src="" alt="Hasil foto akan muncul di sini" style="display: none;">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
